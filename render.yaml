services:
  # Unified Web Service (Server + Client)
  - type: web
    name: lms-ai
    env: node
    plan: free
    buildCommand: |
      # Build client
      cd client && npm install && npm run build
      # Build server
      cd ../server && npm install && npm run build
      # Move client dist into server for easier access
      mkdir -p dist/client
      cp -r ../client/dist/* dist/client/
    startCommand: cd server && npm start
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: lms-ai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_API_URL
        value: ""
      - key: API_URL
        value: ""

databases:
  - name: lms-ai-db
    plan: free
    databaseName: lms_ai
    user: lms_ai_user
