services:
  # Server Service
  - type: web
    name: lms-ai-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: lms-ai-db
          property: connectionString
      - key: CLIENT_URL
        fromService:
          type: static_site
          name: lms-ai-client
          property: url
      - key: API_URL
        fromService:
          type: web
          name: lms-ai-api
          property: url
      - key: JWT_SECRET
        generateValue: true

  # Client Service
  - type: static_site
    name: lms-ai-client
    env: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: lms-ai-api
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: lms-ai-db
    plan: free
    databaseName: lms_ai
    user: lms_ai_user
