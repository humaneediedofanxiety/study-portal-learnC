services:
  - type: web
    name: lms-ai
    env: node
    plan: free
    # Run build from the root of the repo
    buildCommand: |
      echo "--- Building Client ---"
      cd client && npm install && npm run build
      echo "--- Building Server ---"
      cd ../server && npm install && npm run build
      echo "--- Finalizing Structure ---"
      # Move build assets to where the server expects them
      rm -rf dist/client
      mkdir -p dist/client
      cp -r ../client/dist/* ./dist/client/
      echo "--- Deployment Ready ---"
    startCommand: cd server && npm start
    envVars:
      - key: NODE_VERSION
        value: 22.13.1
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: lms-ai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: lms-ai-db
    plan: free
    databaseName: lms_ai
    user: lms_ai_user
